name: Mise à jour mensuelle — Comparatif Recharge VE

on:
  schedule:
    - cron: '0 8 1 * *'   # Le 1er de chaque mois à 8h UTC
  workflow_dispatch:        # Déclenchable manuellement depuis GitHub

jobs:
  update-prices:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Installer les dépendances
        run: pip install anthropic

      - name: Mettre à jour les tarifs
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python .github/scripts/update_recharge.py

      - name: Commit et push si changements
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add recharge-comparatif.html
          if git diff --staged --quiet; then
            echo "Aucun changement détecté, rien à commiter."
          else
            git commit -m "Mise à jour automatique tarifs recharge VE — $(date +%Y-%m-%d)"
            git push origin main
            echo "✓ Page mise à jour et poussée."
          fi
