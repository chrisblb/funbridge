name: Rappel mensuel — Comparatif Recharge VE

on:
  schedule:
    - cron: '0 8 1 * *'   # Le 1er de chaque mois à 8h UTC
  workflow_dispatch:        # Déclenchable manuellement depuis GitHub

jobs:
  create-reminder-issue:
    runs-on: ubuntu-latest
    permissions:
      issues: write

    steps:
      - name: Créer l'issue de rappel
        uses: actions/github-script@v7
        with:
          script: |
            const today = new Date().toLocaleDateString('fr-FR', {
              day: 'numeric', month: 'long', year: 'numeric'
            });

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `⚡ [${today}] Mettre à jour le comparatif recharge VE`,
              body: `## ⚡ Mise à jour mensuelle du comparatif recharge VE

**Date du rappel :** ${today}

Il est temps de vérifier les tarifs sur [recharge-comparatif.html](https://chrisblb.github.io/funbridge/recharge-comparatif.html).

### À faire

Envoyer ce message à Claude Code :

> Peux-tu actualiser le comparatif recharge ? Voici les éventuels changements : [préciser si vous en connaissez, sinon laisser Claude chercher]

Claude mettra à jour le fichier et poussera les changements automatiquement.

---
*Issue créée automatiquement le 1er de chaque mois.*`
            });
