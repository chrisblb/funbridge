  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', Arial, sans-serif; background: #f4f6f9; color: #333; padding: 20px; }
    h1 { text-align: center; margin-bottom: 20px; color: #2c3e50; font-size: 1.8rem; }

    .controls {
      display: flex; gap: 10px; flex-wrap: wrap;
      justify-content: center; margin-bottom: 16px; align-items: center;
    }
    input[type="text"] {
      padding: 9px 14px; border: 1px solid #ccc; border-radius: 8px;
      font-size: 1rem; width: 300px; outline: none; transition: border-color .2s;
    }
    input[type="text"]:focus { border-color: #3498db; }

    select {
      padding: 9px 12px; border: 1px solid #ccc; border-radius: 8px;
      font-size: .9rem; background: #fff; cursor: pointer; outline: none;
    }

    .filter-btns { display: flex; gap: 6px; flex-wrap: wrap; justify-content: center; }
    .filter-btns button {
      padding: 8px 16px; border: 1px solid #ccc; background: #fff;
      border-radius: 8px; cursor: pointer; font-size: .9rem; transition: all .2s;
    }
    .filter-btns button:hover { background: #eaf4fb; }
    .filter-btns button.active { background: #3498db; color: #fff; border-color: #3498db; }

    .summary { text-align: center; margin-bottom: 18px; color: #666; font-size: .9rem; }

    .section-block { margin-top: 28px; }
    .section-title {
      background: #2c3e50; color: #fff; padding: 10px 16px;
      border-radius: 8px 8px 0 0; font-size: 1rem; font-weight: 600;
    }
    .section-title span { font-weight: 300; font-size: .85rem; margin-left: 8px; opacity: .8; }

    .book-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(270px, 1fr));
      gap: 12px; background: #e8ecf0; padding: 12px; border-radius: 0 0 8px 8px;
    }
    .book-card {
      background: #fff; border-radius: 8px; padding: 14px;
      border-left: 4px solid #3498db; box-shadow: 0 1px 3px rgba(0,0,0,.08);
      transition: transform .15s, box-shadow .15s;
    }
    .book-card:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(0,0,0,.12); }
    .book-card.commande { border-left-color: #27ae60; }
    .book-card.precommande { border-left-color: #e67e22; }

    .book-title { font-weight: 700; font-size: .95rem; color: #2c3e50; line-height: 1.3; margin-bottom: 4px; }
    .book-author { font-size: .85rem; color: #555; margin-bottom: 6px; font-style: italic; }
    .book-meta { font-size: .8rem; color: #777; margin-bottom: 2px; }
    .book-price {
      display: inline-block; background: #eaf4fb; color: #2980b9;
      border-radius: 4px; padding: 2px 8px; font-weight: 700; font-size: .9rem; margin-top: 6px;
    }
    .badge {
      display: inline-block; font-size: .68rem; padding: 1px 6px; border-radius: 4px;
      margin-left: 6px; font-weight: 600; vertical-align: middle;
      background: #fdebd0; color: #e67e22;
    }
    .empty-section { padding: 16px; text-align: center; color: #999; background: #e8ecf0; border-radius: 0 0 8px 8px; }
    .no-results { text-align: center; padding: 40px; color: #999; font-size: 1.1rem; }
    .hidden { display: none !important; }
  </style>
</head>
<body>

<h1>📚 Inventaire Livres</h1>

<div class="controls">
  <input type="text" id="searchInput" placeholder="Rechercher titre, auteur, éditeur…">
  <select id="sortSelect">
    <option value="default">Ordre d'origine</option>
    <option value="title-az">Titre A → Z</option>
    <option value="title-za">Titre Z → A</option>
    <option value="author-az">Auteur A → Z</option>
    <option value="price-asc">Prix croissant</option>
    <option value="price-desc">Prix décroissant</option>
    <option value="date-asc">Date ancienne → récente</option>
    <option value="date-desc">Date récente → ancienne</option>
    <option value="publisher-az">Éditeur A → Z</option>
  </select>
</div>

<div class="controls">
  <div class="filter-btns">
    <button class="active" data-filter="all">Tout</button>
    <button data-filter="stock">En stock</button>
    <button data-filter="commande">Commandés</button>
    <button data-filter="precommande">Précommandes</button>
  </div>
</div>

<div class="summary" id="summary"></div>

const SECTIONS = [
  { key: "stock",       label: "📦 Articles en stock",  sub: "Expédié du lundi au samedi", color: "#2c3e50" },
  { key: "commande",    label: "🚚 Articles commandés",  sub: "Expédié sous 4 à 15 jours", color: "#27ae60" },
  { key: "precommande", label: "⏳ Précommandes",        sub: "",                           color: "#e67e22" },
];

let currentFilter = 'all';
let currentSort = 'default';
let currentQuery = '';

function normalize(str) {
  return str.toLowerCase()
    .normalize('NFD').replace(/[̀-ͯ]/g, '');
}

function sortedBooks(list) {
  const copy = [...list];
  switch (currentSort) {
    case 'title-az':     return copy.sort((a, b) => normalize(a.title).localeCompare(normalize(b.title)));
    case 'title-za':     return copy.sort((a, b) => normalize(b.title).localeCompare(normalize(a.title)));
    case 'author-az':    return copy.sort((a, b) => normalize(a.author).localeCompare(normalize(b.author)));
    case 'price-asc':    return copy.sort((a, b) => a.price - b.price);
    case 'price-desc':   return copy.sort((a, b) => b.price - a.price);
    case 'date-asc':     return copy.sort((a, b) => a.dateSort.localeCompare(b.dateSort));
    case 'date-desc':    return copy.sort((a, b) => b.dateSort.localeCompare(a.dateSort));
    case 'publisher-az': return copy.sort((a, b) => normalize(a.publisher).localeCompare(normalize(b.publisher)));
    default:             return copy;
  }
}

function matchesQuery(book) {
  if (!currentQuery) return true;
  const q = normalize(currentQuery);
  return normalize(book.title).includes(q)
      || normalize(book.author).includes(q)
      || normalize(book.publisher).includes(q)
      || book.isbn.includes(q);
}

function render() {
  const container = document.getElementById('sections-container');
  container.innerHTML = '';
  let totalVisible = 0;

  SECTIONS.forEach(sec => {
    if (currentFilter !== 'all' && currentFilter !== sec.key) return;

    const filtered = sortedBooks(BOOKS.filter(b => b.section === sec.key && matchesQuery(b)));
    totalVisible += filtered.length;

    const block = document.createElement('div');
    block.className = 'section-block';

    const titleEl = document.createElement('div');
    titleEl.className = 'section-title';
    titleEl.style.background = sec.color;
    titleEl.innerHTML = sec.label + (sec.sub ? `<span>${sec.sub}</span>` : '');
    block.appendChild(titleEl);

    if (filtered.length === 0) {
      const empty = document.createElement('div');
      empty.className = 'empty-section';
      empty.textContent = 'Aucun résultat dans cette section.';
      block.appendChild(empty);
    } else {
      const grid = document.createElement('div');
      grid.className = 'book-grid';

      filtered.forEach(book => {
        const card = document.createElement('div');
        card.className = 'book-card ' + book.section;
        card.innerHTML = `
          <div class="book-title">${book.title}${book.section === 'precommande' ? ' <span class="badge">Préco</span>' : ''}</div>
          <div class="book-author">${book.author}</div>
          <div class="book-meta">${book.publisher} · ${book.date}</div>
          <div class="book-meta">ISBN : ${book.isbn}</div>
          <span class="book-price">${book.price.toFixed(2).replace('.', ',')} €</span>`;
        grid.appendChild(card);
      });

      block.appendChild(grid);
    }

    container.appendChild(block);
  });

  const countTxt = totalVisible === 0
    ? 'Aucun résultat.'
    : totalVisible + ' livre' + (totalVisible > 1 ? 's' : '') + ' affiché' + (totalVisible > 1 ? 's' : '');
  document.getElementById('summary').textContent = countTxt;
}

// ── Events ───────────────────────────────────────────────────────────────────
document.getElementById('searchInput').addEventListener('input', function() {
  currentQuery = this.value;
  render();
});

document.getElementById('sortSelect').addEventListener('change', function() {
  currentSort = this.value;
  render();
});

document.querySelectorAll('.filter-btns button').forEach(btn => {
  btn.addEventListener('click', function() {
    document.querySelectorAll('.filter-btns button').forEach(b => b.classList.remove('active'));
    this.classList.add('active');
    currentFilter = this.dataset.filter;
    render();
  });
});

render();
</script>
