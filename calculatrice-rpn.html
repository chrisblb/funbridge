<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculatrice RPN</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #1a1a2e;
      font-family: 'Courier New', monospace;
      padding: 10px;
    }

    .calc {
      background: #16213e;
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
      width: 300px;
    }

    /* Stack display */
    .stack {
      background: #0f3460;
      border-radius: 8px;
      padding: 10px;
      margin-bottom: 12px;
      height: 120px;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      gap: 2px;
      overflow: hidden;
    }

    .stack-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 2px 6px;
      border-radius: 4px;
      background: rgba(255,255,255,0.05);
    }

    .stack-label {
      color: #e94560;
      font-size: 11px;
      font-weight: bold;
      min-width: 24px;
    }

    .stack-value {
      color: #e0e0e0;
      font-size: 14px;
      text-align: right;
      flex: 1;
    }

    /* Main display */
    .display {
      background: #0f3460;
      border-radius: 8px;
      padding: 10px 14px;
      margin-bottom: 4px;
      text-align: right;
    }

    .display-entry {
      color: #ffffff;
      font-size: 28px;
      font-weight: bold;
      min-height: 36px;
      word-break: break-all;
    }

    .display-hint {
      color: #ffd54f;
      font-size: 12px;
      height: 16px;
      font-weight: bold;
    }

    /* Memory indicator */
    .mem-indicator {
      color: #53c0f0;
      font-size: 11px;
      text-align: left;
      margin-bottom: 12px;
      min-height: 14px;
      line-height: 1.4;
      word-break: break-all;
    }

    .mem-indicator span {
      display: inline-block;
      background: rgba(83,192,240,0.15);
      padding: 1px 5px;
      border-radius: 4px;
      margin: 1px 2px 1px 0;
    }

    /* Buttons grid */
    .buttons {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
    }

    button {
      border: none;
      border-radius: 8px;
      padding: 14px 0;
      font-size: 16px;
      font-family: 'Courier New', monospace;
      font-weight: bold;
      cursor: pointer;
      transition: transform 0.08s, filter 0.08s, box-shadow 0.08s;
      user-select: none;
    }

    button:active {
      transform: scale(0.93);
      filter: brightness(0.85);
    }

    button.armed {
      box-shadow: 0 0 0 3px #ffd54f;
      filter: brightness(1.2);
    }

    .btn-digit {
      background: #253a5e;
      color: #e0e0e0;
    }

    .btn-op {
      background: #e94560;
      color: #fff;
    }

    .btn-enter {
      background: #0fbc5a;
      color: #fff;
      grid-column: span 2;
    }

    .btn-clear {
      background: #f5a623;
      color: #fff;
    }

    .btn-mem {
      background: #7c4dff;
      color: #fff;
    }

    .btn-sign {
      background: #253a5e;
      color: #e0e0e0;
    }

    .btn-dot {
      background: #253a5e;
      color: #e0e0e0;
    }

    .btn-back {
      background: #3a3a5e;
      color: #e0e0e0;
      font-size: 18px;
    }
  </style>
</head>
<body>
<div class="calc">
  <!-- Stack -->
  <div class="stack" id="stack">
    <div class="stack-row"><span class="stack-label">T</span><span class="stack-value" id="st-t">0</span></div>
    <div class="stack-row"><span class="stack-label">Z</span><span class="stack-value" id="st-z">0</span></div>
    <div class="stack-row"><span class="stack-label">Y</span><span class="stack-value" id="st-y">0</span></div>
    <div class="stack-row"><span class="stack-label">X</span><span class="stack-value" id="st-x">0</span></div>
  </div>

  <!-- Entry display -->
  <div class="display">
    <div class="display-hint" id="hint"></div>
    <div class="display-entry" id="entry">0</div>
  </div>

  <!-- Memory -->
  <div class="mem-indicator" id="mem-ind"></div>

  <!-- Buttons -->
  <div class="buttons">
    <!-- Row 1 -->
    <button class="btn-clear" onclick="ac()">AC</button>
    <button class="btn-back"  onclick="backspace()">&#9003;</button>
    <button class="btn-mem" id="btn-sto" onclick="sto()">STO</button>
    <button class="btn-mem" id="btn-rcl" onclick="rcl()">RCL</button>

    <!-- Row 2 -->
    <button class="btn-digit" onclick="digit('7')">7</button>
    <button class="btn-digit" onclick="digit('8')">8</button>
    <button class="btn-digit" onclick="digit('9')">9</button>
    <button class="btn-op"    onclick="op('/')">&#247;</button>

    <!-- Row 3 -->
    <button class="btn-digit" onclick="digit('4')">4</button>
    <button class="btn-digit" onclick="digit('5')">5</button>
    <button class="btn-digit" onclick="digit('6')">6</button>
    <button class="btn-op"    onclick="op('*')">&#215;</button>

    <!-- Row 4 -->
    <button class="btn-digit" onclick="digit('1')">1</button>
    <button class="btn-digit" onclick="digit('2')">2</button>
    <button class="btn-digit" onclick="digit('3')">3</button>
    <button class="btn-op"    onclick="op('-')">&#8722;</button>

    <!-- Row 5 -->
    <button class="btn-sign"  onclick="negate()">+/&#8722;</button>
    <button class="btn-digit" onclick="digit('0')">0</button>
    <button class="btn-dot"   onclick="dot()">.</button>
    <button class="btn-op"    onclick="op('+')">+</button>

    <!-- Row 6 -->
    <button class="btn-enter" onclick="enter()">ENTER &#8629;</button>
    <button class="btn-clear" onclick="drop()">DROP</button>
    <button class="btn-clear" onclick="swap()">SWAP</button>
  </div>
</div>

<script>
  let stack = [0, 0, 0, 0];
  let entry = '0';
  let hasEntry = false;
  let justEntered = false;
  let memories = {};        // { 0: val, 1: val, ... }  registres 0-9
  let pendingMemOp = null;  // 'sto' | 'rcl' | null

  function fmt(n) {
    if (!isFinite(n)) return isNaN(n) ? 'Erreur' : (n > 0 ? '+∞' : '−∞');
    return parseFloat(n.toPrecision(10)).toString();
  }

  function updateDisplay() {
    document.getElementById('entry').textContent = hasEntry ? entry : fmt(stack[0]);
    document.getElementById('st-x').textContent = fmt(stack[0]);
    document.getElementById('st-y').textContent = fmt(stack[1]);
    document.getElementById('st-z').textContent = fmt(stack[2]);
    document.getElementById('st-t').textContent = fmt(stack[3]);

    // Indicateur mémoires : liste des registres remplis
    const memEl = document.getElementById('mem-ind');
    const keys = Object.keys(memories).sort();
    if (keys.length === 0) {
      memEl.innerHTML = '';
    } else {
      memEl.innerHTML = keys.map(k => `<span>R${k}=${fmt(memories[k])}</span>`).join('');
    }

    // Hint
    let hint = '';
    if (pendingMemOp === 'sto') hint = 'STO — chiffre 0-9 ?';
    else if (pendingMemOp === 'rcl') hint = 'RCL — chiffre 0-9 ?';
    else if (hasEntry) hint = 'saisie';
    document.getElementById('hint').textContent = hint;

    // Armed buttons
    document.getElementById('btn-sto').classList.toggle('armed', pendingMemOp === 'sto');
    document.getElementById('btn-rcl').classList.toggle('armed', pendingMemOp === 'rcl');
  }

  function liftStack() {
    stack[3] = stack[2];
    stack[2] = stack[1];
    stack[1] = stack[0];
  }

  function cancelPending() {
    if (pendingMemOp) {
      pendingMemOp = null;
      updateDisplay();
    }
  }

  function digit(d) {
    // Si STO/RCL en attente, le chiffre est un n° de registre
    if (pendingMemOp === 'sto') {
      const reg = d;
      const val = hasEntry ? parseFloat(entry) : stack[0];
      memories[reg] = isNaN(val) ? 0 : val;
      pendingMemOp = null;
      updateDisplay();
      return;
    }
    if (pendingMemOp === 'rcl') {
      const reg = d;
      pendingMemOp = null;
      if (memories[reg] === undefined) {
        updateDisplay();
        return;
      }
      // Si saisie en cours, on la pousse d'abord (comme ENTER)
      if (hasEntry) {
        const val = parseFloat(entry);
        liftStack();
        stack[0] = isNaN(val) ? 0 : val;
        hasEntry = false;
      }
      liftStack();
      stack[0] = memories[reg];
      updateDisplay();
      return;
    }

    // saisie normale
    if (!hasEntry) {
      entry = d === '0' ? '0' : d;
      hasEntry = true;
    } else {
      if (entry === '0' && d !== '.') entry = d;
      else entry += d;
    }
    justEntered = false;
    updateDisplay();
  }

  function dot() {
    cancelPending();
    if (!hasEntry) { entry = '0.'; hasEntry = true; }
    else if (!entry.includes('.')) entry += '.';
    justEntered = false;
    updateDisplay();
  }

  function negate() {
    cancelPending();
    if (hasEntry) {
      entry = entry.startsWith('-') ? entry.slice(1) : '-' + entry;
    } else {
      stack[0] = -stack[0];
    }
    updateDisplay();
  }

  function backspace() {
    if (pendingMemOp) { cancelPending(); return; }
    if (!hasEntry) return;
    entry = entry.slice(0, -1);
    if (entry === '' || entry === '-') entry = '0';
    updateDisplay();
  }

  function enter() {
    cancelPending();
    const val = hasEntry ? parseFloat(entry) : stack[0];
    liftStack();
    stack[0] = isNaN(val) ? 0 : val;
    hasEntry = false;
    justEntered = true;
    updateDisplay();
  }

  function op(operator) {
    cancelPending();
    if (hasEntry) {
      const val = parseFloat(entry);
      liftStack();
      stack[0] = isNaN(val) ? 0 : val;
      hasEntry = false;
    }
    const y = stack[1];
    const x = stack[0];
    let result;
    switch (operator) {
      case '+': result = y + x; break;
      case '-': result = y - x; break;
      case '*': result = y * x; break;
      case '/': result = x === 0 ? Infinity : y / x; break;
    }
    stack[0] = result;
    stack[1] = stack[2];
    stack[2] = stack[3];
    updateDisplay();
  }

  function ac() {
    // AC efface la pile et la saisie mais conserve les mémoires
    if (pendingMemOp) { cancelPending(); return; }
    stack = [0, 0, 0, 0];
    entry = '0';
    hasEntry = false;
    justEntered = false;
    updateDisplay();
  }

  function drop() {
    cancelPending();
    if (hasEntry) { hasEntry = false; entry = '0'; }
    else {
      stack[0] = stack[1];
      stack[1] = stack[2];
      stack[2] = stack[3];
    }
    updateDisplay();
  }

  function swap() {
    cancelPending();
    if (hasEntry) {
      const val = parseFloat(entry);
      liftStack();
      stack[0] = isNaN(val) ? 0 : val;
      hasEntry = false;
    }
    [stack[0], stack[1]] = [stack[1], stack[0]];
    updateDisplay();
  }

  function sto() {
    // Re-appui sur STO annule
    if (pendingMemOp === 'sto') { pendingMemOp = null; updateDisplay(); return; }
    pendingMemOp = 'sto';
    updateDisplay();
  }

  function rcl() {
    if (pendingMemOp === 'rcl') { pendingMemOp = null; updateDisplay(); return; }
    pendingMemOp = 'rcl';
    updateDisplay();
  }

  // Effacer toutes les mémoires : double-tap long sur STO ? non, plus simple :
  // appui sur AC pendant que STO est armé efface toutes les mémoires
  // (la fonction ac() ci-dessus annule juste le pending — adaptation :)
  // En réalité on garde le comportement simple ; pour vider une mémoire,
  // tu peux y stocker 0.

  document.addEventListener('keydown', e => {
    if (e.key >= '0' && e.key <= '9') digit(e.key);
    else if (e.key === '.') dot();
    else if (e.key === 'Enter' || e.key === ' ') enter();
    else if (e.key === '+') op('+');
    else if (e.key === '-') op('-');
    else if (e.key === '*') op('*');
    else if (e.key === '/') { e.preventDefault(); op('/'); }
    else if (e.key === 'Backspace') backspace();
    else if (e.key === 'Escape') ac();
    else if (e.key === 's' || e.key === 'S') sto();
    else if (e.key === 'r' || e.key === 'R') rcl();
  });

  updateDisplay();
</script>
</body>
</html>
