<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculatrice RPN</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #1a1a2e;
      font-family: 'Courier New', monospace;
    }

    .calc {
      background: #16213e;
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
      width: 280px;
    }

    /* Stack display */
    .stack {
      background: #0f3460;
      border-radius: 8px;
      padding: 10px;
      margin-bottom: 12px;
      height: 120px;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      gap: 2px;
      overflow: hidden;
    }

    .stack-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 2px 6px;
      border-radius: 4px;
      background: rgba(255,255,255,0.05);
    }

    .stack-label {
      color: #e94560;
      font-size: 11px;
      font-weight: bold;
      min-width: 24px;
    }

    .stack-value {
      color: #e0e0e0;
      font-size: 14px;
      text-align: right;
      flex: 1;
    }

    /* Main display */
    .display {
      background: #0f3460;
      border-radius: 8px;
      padding: 10px 14px;
      margin-bottom: 4px;
      text-align: right;
    }

    .display-entry {
      color: #ffffff;
      font-size: 28px;
      font-weight: bold;
      min-height: 36px;
      word-break: break-all;
    }

    .display-hint {
      color: #e94560;
      font-size: 11px;
      height: 16px;
    }

    /* Memory indicator */
    .mem-indicator {
      color: #53c0f0;
      font-size: 11px;
      text-align: right;
      margin-bottom: 12px;
      height: 14px;
    }

    /* Buttons grid */
    .buttons {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
    }

    button {
      border: none;
      border-radius: 8px;
      padding: 14px 0;
      font-size: 16px;
      font-family: 'Courier New', monospace;
      font-weight: bold;
      cursor: pointer;
      transition: transform 0.08s, filter 0.08s;
      user-select: none;
    }

    button:active {
      transform: scale(0.93);
      filter: brightness(0.85);
    }

    .btn-digit {
      background: #253a5e;
      color: #e0e0e0;
    }

    .btn-op {
      background: #e94560;
      color: #fff;
    }

    .btn-enter {
      background: #0fbc5a;
      color: #fff;
      grid-column: span 2;
    }

    .btn-clear {
      background: #f5a623;
      color: #fff;
    }

    .btn-mem {
      background: #7c4dff;
      color: #fff;
    }

    .btn-sign {
      background: #253a5e;
      color: #e0e0e0;
    }

    .btn-dot {
      background: #253a5e;
      color: #e0e0e0;
    }

    .btn-back {
      background: #3a3a5e;
      color: #e0e0e0;
      font-size: 18px;
    }
  </style>
</head>
<body>
<div class="calc">
  <!-- Stack -->
  <div class="stack" id="stack">
    <div class="stack-row"><span class="stack-label">T</span><span class="stack-value" id="st-t">0</span></div>
    <div class="stack-row"><span class="stack-label">Z</span><span class="stack-value" id="st-z">0</span></div>
    <div class="stack-row"><span class="stack-label">Y</span><span class="stack-value" id="st-y">0</span></div>
    <div class="stack-row"><span class="stack-label">X</span><span class="stack-value" id="st-x">0</span></div>
  </div>

  <!-- Entry display -->
  <div class="display">
    <div class="display-hint" id="hint"></div>
    <div class="display-entry" id="entry">0</div>
  </div>

  <!-- Memory -->
  <div class="mem-indicator" id="mem-ind"></div>

  <!-- Buttons -->
  <div class="buttons">
    <!-- Row 1 -->
    <button class="btn-clear" onclick="ac()">AC</button>
    <button class="btn-back"  onclick="backspace()">⌫</button>
    <button class="btn-mem"   onclick="sto()">STO</button>
    <button class="btn-mem"   onclick="rcl()">RCL</button>

    <!-- Row 2 -->
    <button class="btn-digit" onclick="digit('7')">7</button>
    <button class="btn-digit" onclick="digit('8')">8</button>
    <button class="btn-digit" onclick="digit('9')">9</button>
    <button class="btn-op"    onclick="op('/')">÷</button>

    <!-- Row 3 -->
    <button class="btn-digit" onclick="digit('4')">4</button>
    <button class="btn-digit" onclick="digit('5')">5</button>
    <button class="btn-digit" onclick="digit('6')">6</button>
    <button class="btn-op"    onclick="op('*')">×</button>

    <!-- Row 4 -->
    <button class="btn-digit" onclick="digit('1')">1</button>
    <button class="btn-digit" onclick="digit('2')">2</button>
    <button class="btn-digit" onclick="digit('3')">3</button>
    <button class="btn-op"    onclick="op('-')">−</button>

    <!-- Row 5 -->
    <button class="btn-sign"  onclick="negate()">+/−</button>
    <button class="btn-digit" onclick="digit('0')">0</button>
    <button class="btn-dot"   onclick="dot()">.</button>
    <button class="btn-op"    onclick="op('+')">+</button>

    <!-- Row 6 -->
    <button class="btn-enter" onclick="enter()">ENTER ↵</button>
    <button class="btn-clear" onclick="drop()">DROP</button>
    <button class="btn-clear" onclick="swap()">SWAP</button>
  </div>
</div>

<script>
  // Stack: index 0 = X (bottom), 1 = Y, 2 = Z, 3 = T
  let stack = [0, 0, 0, 0];
  let entry = '0';
  let hasEntry = false;    // user is typing a new number
  let justEntered = false; // ENTER was just pressed
  let memory = null;

  function fmt(n) {
    if (!isFinite(n)) return isNaN(n) ? 'Erreur' : (n > 0 ? '+∞' : '−∞');
    // Use toPrecision to avoid floating-point noise, then strip trailing zeros
    let s = parseFloat(n.toPrecision(10)).toString();
    return s;
  }

  function updateDisplay() {
    document.getElementById('entry').textContent = hasEntry ? entry : fmt(stack[0]);
    document.getElementById('st-x').textContent = fmt(stack[0]);
    document.getElementById('st-y').textContent = fmt(stack[1]);
    document.getElementById('st-z').textContent = fmt(stack[2]);
    document.getElementById('st-t').textContent = fmt(stack[3]);
    document.getElementById('mem-ind').textContent = memory !== null ? `M: ${fmt(memory)}` : '';
    document.getElementById('hint').textContent = hasEntry ? 'saisie' : '';
  }

  function liftStack() {
    stack[3] = stack[2];
    stack[2] = stack[1];
    stack[1] = stack[0];
  }

  function digit(d) {
    if (!hasEntry) {
      entry = d === '0' ? '0' : d;
      hasEntry = true;
    } else {
      if (entry === '0' && d !== '.') entry = d;
      else entry += d;
    }
    justEntered = false;
    updateDisplay();
  }

  function dot() {
    if (!hasEntry) { entry = '0.'; hasEntry = true; }
    else if (!entry.includes('.')) entry += '.';
    justEntered = false;
    updateDisplay();
  }

  function negate() {
    if (hasEntry) {
      entry = entry.startsWith('-') ? entry.slice(1) : '-' + entry;
    } else {
      stack[0] = -stack[0];
    }
    updateDisplay();
  }

  function backspace() {
    if (!hasEntry) return;
    entry = entry.slice(0, -1);
    if (entry === '' || entry === '-') entry = '0';
    updateDisplay();
  }

  function enter() {
    const val = hasEntry ? parseFloat(entry) : stack[0];
    liftStack();
    stack[0] = isNaN(val) ? 0 : val;
    hasEntry = false;
    justEntered = true;
    updateDisplay();
  }

  function op(operator) {
    // If user is mid-entry, push the entry first
    if (hasEntry) {
      const val = parseFloat(entry);
      liftStack();
      stack[0] = isNaN(val) ? 0 : val;
      hasEntry = false;
    }
    const y = stack[1];
    const x = stack[0];
    let result;
    switch (operator) {
      case '+': result = y + x; break;
      case '-': result = y - x; break;
      case '*': result = y * x; break;
      case '/': result = x === 0 ? Infinity : y / x; break;
    }
    // Drop stack after operation
    stack[0] = result;
    stack[1] = stack[2];
    stack[2] = stack[3];
    updateDisplay();
  }

  function ac() {
    stack = [0, 0, 0, 0];
    entry = '0';
    hasEntry = false;
    justEntered = false;
    updateDisplay();
  }

  function drop() {
    if (hasEntry) { hasEntry = false; entry = '0'; }
    else {
      stack[0] = stack[1];
      stack[1] = stack[2];
      stack[2] = stack[3];
    }
    updateDisplay();
  }

  function swap() {
    if (hasEntry) {
      const val = parseFloat(entry);
      liftStack();
      stack[0] = isNaN(val) ? 0 : val;
      hasEntry = false;
    }
    [stack[0], stack[1]] = [stack[1], stack[0]];
    updateDisplay();
  }

  function sto() {
    memory = hasEntry ? parseFloat(entry) : stack[0];
    if (isNaN(memory)) memory = 0;
    updateDisplay();
  }

  function rcl() {
    if (memory === null) return;
    if (!hasEntry) liftStack();
    stack[0] = memory;
    hasEntry = false;
    updateDisplay();
  }

  // Keyboard support
  document.addEventListener('keydown', e => {
    if (e.key >= '0' && e.key <= '9') digit(e.key);
    else if (e.key === '.') dot();
    else if (e.key === 'Enter' || e.key === ' ') enter();
    else if (e.key === '+') op('+');
    else if (e.key === '-') op('-');
    else if (e.key === '*') op('*');
    else if (e.key === '/') { e.preventDefault(); op('/'); }
    else if (e.key === 'Backspace') backspace();
    else if (e.key === 'Escape') ac();
  });

  updateDisplay();
</script>
</body>
</html>
