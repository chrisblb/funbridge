td.rk{text-align:center;font-weight:600;}
tr.hd{display:none;}
mark{background:#c8e8d8;border-radius:2px;padding:0 1px;}
th.sk{cursor:pointer;user-select:none;}

.sa{opacity:.55;font-size:9px;margin-left:3px;}
table.wt{width:auto;min-width:100%;}

(function(){

function show(i){
  document.querySelectorAll(".tb").forEach(function(t,j){t.classList.toggle("on",j===i);});
  document.querySelectorAll(".sh").forEach(function(s,j){s.classList.toggle("on",j===i);});
  ds(document.getElementById("sq").value);
}
function ds(q){
  var ql=q.toLowerCase(),cb=document.getElementById("cb"),mc=document.getElementById("mc");
  cb.classList.toggle("on",q.length>0);
  if(!ql){mc.textContent="";document.querySelectorAll(".sh.on tbody tr").forEach(function(r){r.classList.remove("hd");rm(r);});return;}
  var n=0;
  document.querySelectorAll(".sh.on tbody tr").forEach(function(row){
    if(row.textContent.toLowerCase().indexOf(ql)>=0){row.classList.remove("hd");hl(row,ql);n++;}
    else{row.classList.add("hd");rm(row);}
  });
  mc.textContent=n+(n===1?" r\u00e9sultat":" r\u00e9sultats");
}
function cs(){var i=document.getElementById("sq");i.value="";document.getElementById("cb").classList.remove("on");document.getElementById("mc").textContent="";document.querySelectorAll("tbody tr").forEach(function(r){r.classList.remove("hd");rm(r);});}
function hl(r,q){r.querySelectorAll("td").forEach(function(td){var o=td.getAttribute("data-o")||td.textContent;td.setAttribute("data-o",o);var re=new RegExp("("+q.replace(/[.*+?^${}()|[\]\\]/g,"\\$&")+")","gi");td.innerHTML=o.replace(re,"<mark>$1<\/mark>");});}
function rm(r){r.querySelectorAll("td").forEach(function(td){var o=td.getAttribute("data-o");if(o){td.textContent=o;td.removeAttribute("data-o");}});}
function initSort(){
  document.querySelectorAll(".sh table").forEach(function(tbl){
    tbl.querySelectorAll("thead th").forEach(function(th,ci){
      if(/joker|attendus/i.test(th.textContent)) return;
      th.classList.add("sk");
      var sp=document.createElement("span");
      sp.className="sa";sp.textContent="\u21c5";
      th.appendChild(sp);
      th.addEventListener("click",function(){
        var asc=th.dataset.sort!=="asc";
        tbl.querySelectorAll("thead th").forEach(function(h){h.dataset.sort="";var s=h.querySelector(".sa");if(s){s.textContent="\u21c5";s.style.opacity=".55";}});
        th.dataset.sort=asc?"asc":"desc";
        sp.textContent=asc?"\u2191":"\u2193";
        sp.style.opacity="1";
        var tbody=tbl.querySelector("tbody");
        var rows=Array.from(tbody.querySelectorAll("tr"));
        rows.sort(function(a,b){
          var av=(a.cells[ci]||{}).textContent||"";
          var bv=(b.cells[ci]||{}).textContent||"";
          av=av.trim();bv=bv.trim();
          var an=parseFloat(av.replace(/[^\d.-]/g,"")),bn=parseFloat(bv.replace(/[^\d.-]/g,""));
          if(!isNaN(an)&&!isNaN(bn)) return asc?an-bn:bn-an;
          return asc?av.localeCompare(bv,"fr"):bv.localeCompare(av,"fr");
        });
        rows.forEach(function(r){tbody.appendChild(r);});
      });
    });
  });
}
