<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Les Cadors – Classements</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--g:#1a6b3c;--gl:#e8f5ee;--gm:#2d8a52;--b:#dde8e3;--bg:#f7faf8;--mu:#666;--tx:#1a1a1a;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:"DM Sans",sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;}
header{background:var(--g);color:#fff;padding:24px 20px 20px;text-align:center;}
header h1{font-family:"Playfair Display",serif;font-size:clamp(22px,5vw,36px);}
header p{font-size:13px;opacity:.75;margin-top:4px;}
.tw{background:#fff;border-bottom:1px solid var(--b);overflow-x:auto;scrollbar-width:none;}
.tw::-webkit-scrollbar{display:none;}
.tbs{display:flex;min-width:max-content;padding:0 12px;}
.tb{padding:12px 16px;font-size:13px;font-weight:500;color:var(--mu);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:all .15s;}
.tb.on{color:var(--g);border-bottom-color:var(--g);font-weight:600;}
.sb{background:#fff;padding:10px 16px;border-bottom:1px solid var(--b);display:flex;align-items:center;gap:8px;}
.sb input{flex:1;border:1px solid var(--b);border-radius:20px;padding:7px 14px;font-size:14px;outline:none;background:var(--bg);transition:border-color .15s;}
.sb input:focus{border-color:var(--g);}.sb input::placeholder{color:#aaa;}
.clr{background:none;border:none;cursor:pointer;color:var(--mu);font-size:18px;padding:2px 6px;display:none;}.clr.on{display:block;}
.mc{font-size:12px;color:var(--mu);white-space:nowrap;min-width:60px;text-align:right;}
.ct{padding:16px;max-width:960px;margin:0 auto;}
.sh{display:none;}.sh.on{display:block;}
.ts{overflow-x:auto;overflow-y:auto;max-height:calc(100vh - 200px);margin-top:8px;}
thead th{position:sticky;top:0;z-index:3;}
table.wt thead th:nth-child(-n+2){z-index:4;}
table{width:100%;border-collapse:collapse;font-size:13px;}
th{background:var(--g);color:#fff;padding:8px 10px;text-align:left;font-weight:600;font-size:11px;letter-spacing:.5px;white-space:nowrap;}
td{padding:7px 10px;border-bottom:1px solid var(--b);white-space:nowrap;}
tr:last-child td{border-bottom:none;}
tr.r1 td,tr.r2 td,tr.r3 td,tr.r20 td{background:#fde8e8;}
tr.r40 td{background:#fff8f0;}
.b1,.b2,.b3{display:inline-flex;align-items:center;justify-content:center;width:26px;height:26px;border-radius:50%;font-weight:700;font-size:13px;color:#fff;}
.b1{background:#c9a84c;}.b2{background:#a0a0a0;}.b3{background:#b87333;}
td.rk{text-align:center;font-weight:600;}
tr.hd{display:none;}
mark{background:#fff176;border-radius:2px;padding:0 1px;}
th.sk{cursor:pointer;user-select:none;}
th.sk:hover{background:var(--gm);}
.sa{opacity:.55;font-size:9px;margin-left:3px;}
table.wt{width:auto;min-width:100%;}
table.wt th:nth-child(1),table.wt td:nth-child(1){position:sticky;left:0;z-index:1;min-width:46px;}
table.wt th:nth-child(2),table.wt td:nth-child(2){position:sticky;left:46px;z-index:1;min-width:130px;box-shadow:2px 0 4px rgba(0,0,0,.07);}
table.wt th:nth-child(-n+2){background:var(--g);z-index:2;}
table.wt td:nth-child(-n+2){background:#f7faf8;}
</style></head><body>
<header><h1>♠♥♦♣ Les Cadors</h1>
<p>Tournoi mensuel Funbridge · Mis à jour le 22 mai 2026 à 06:00</p></header>
<div class="tw"><div class="tbs" id="tabs"></div></div>
<div class="sb">
<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
<input type="text" id="sq" placeholder="Rechercher un joueur…" oninput="ds(this.value)" autocomplete="off">
<button class="clr" id="cb" onclick="cs()">×</button>
<span class="mc" id="mc"></span></div>
<div class="ct" id="ct"></div>
<script>
var S=[{"label":"Mai 2026","headers":["#","Joueur","Pts","Jokers<br><small style=\"font-weight:400;opacity:0.75\">accordés</small>","Attendus","NbJ"],"headerStyles":["","","","","opacity:0.6;outline:1px dashed rgba(255,255,255,0.5);outline-offset:-2px;font-style:italic",""],"rows":[[1,"Ross Taylor",113,"[-16 -6 -]","[-5]",21],[2,"christian dozol",105,"[-13 -13 -]","[-8]",19],[3,"HIBOU666",103,"[-11 -10 -]","[-9]",19],[4,"pawlut",95,"[-13 -8 -]","[-3]",17],[5,"Macigno",84,"[-15 -12 -]","[-11]",21],[6,"chrisblb",68,"[-16 -13 -]","[-11]",21],[7,"fredd",62,"[-12 -5 -]","[-5]",17],[8,"Mat Cauthon",60,"[-31 -14 -]","[-11]",19],[9,"chris3d",59,"[-11 - -]","[-6 -6]",13],[9,"miptit",59,"[-16 -10 -]","[-9]",21],[9,"ZOE e-Rallye",59,"[-17 -12 -]","[-12]",21],[12,"JMDEL",51,"[-18 -12 -]","[-7]",19],[13,"Francis de Lucy",46,"[-14 - -]","[-2 -1]",13],[14,"Pacboy",41,"[-10 -9 -]","[-8]",18],[15,"thierry63",37,"[-79 -24 -]","[-15]",17],[16,"Sorbonne",34,"[-56 - -]","[-12 -5]",13],[17,"anna57",15,"[-13 - -]","[-11 -9]",15],[17,"Richard1729",15,"[-13 -9 -]","[-9]",16],[19,"benoit verjans",6,"-","-",1],[20,"Miguel Cerquinho",5,"[-8 - -]","[-8 -7]",14],[21,"Chris92370",3,"-","-",1],[22,"Huhe",-4,"-","[-32 -4]",6],[23,"Caméléon_",-6,"[-21 -20 -]","[-16]",19],[24,"ronny lundkvist",-7,"-","[-7]",1],[25,"G-3-D",-10,"[-26 - -]","[-19 -18]",14],[26,"svmsn",-27,"[-59 -46 -]","[-29]",16],[27,"dominique parant",-29,"[-27 -21 -]","[-19]",21],[28,"gegeceyrat",-39,"[-18 -13 -]","[-12]",18],[29,"Mighty Sparrow",-73,"[-64 - -]","[-25 -20]",15],[30,"Passepartout63",-74,"[-22 -20 -]","[-20]",16]]}];
(function(){
  var tabs=document.getElementById("tabs"),ct=document.getElementById("ct");
  S.forEach(function(s,i){
    var t=document.createElement("div");
    t.className="tb"+(i===0?" on":"");
    t.textContent=s.label;
    t.onclick=(function(idx){return function(){show(idx);};})(i);
    tabs.appendChild(t);
    var d=document.createElement("div");
    d.id="sh"+i;d.className="sh"+(i===0?" on":"");
    var hdrs=s.headers.map(function(h,i){var st=s.headerStyles&&s.headerStyles[i]?' style="'+s.headerStyles[i]+'"':'';return"<th"+st+">"+h+"<\/th>";}).join("");
    var rows=s.rows.map(function(r){
      var rk=r[0],rc=rk===1?"r1":rk===2?"r2":rk===3?"r3":rk<=20?"r20":rk<=40?"r40":"";
      var tds=r.map(function(v,ci){
        if(ci===0){var b=rk===1?"<span class='b1'>1<\/span>":rk===2?"<span class='b2'>2<\/span>":rk===3?"<span class='b3'>3<\/span>":v;return"<td class='rk'>"+b+"<\/td>";}
        return"<td>"+(v===""?"\u2013":v)+"<\/td>";
      }).join("");
      return"<tr class='"+rc+"'>"+tds+"<\/tr>";
    }).join("");
    d.innerHTML="<div class='ts'><table"+(s.wide?" class='wt'":"")+"><thead><tr>"+hdrs+"<\/tr><\/thead><tbody>"+rows+"<\/tbody><\/table><\/div>";
    ct.appendChild(d);
  });
  initSort();
})();
function show(i){
  document.querySelectorAll(".tb").forEach(function(t,j){t.classList.toggle("on",j===i);});
  document.querySelectorAll(".sh").forEach(function(s,j){s.classList.toggle("on",j===i);});
  ds(document.getElementById("sq").value);
}
function ds(q){
  var ql=q.toLowerCase(),cb=document.getElementById("cb"),mc=document.getElementById("mc");
  cb.classList.toggle("on",q.length>0);
  if(!ql){mc.textContent="";document.querySelectorAll(".sh.on tbody tr").forEach(function(r){r.classList.remove("hd");rm(r);});return;}
  var n=0;
  document.querySelectorAll(".sh.on tbody tr").forEach(function(row){
    if(row.textContent.toLowerCase().indexOf(ql)>=0){row.classList.remove("hd");hl(row,ql);n++;}
    else{row.classList.add("hd");rm(row);}
  });
  mc.textContent=n+(n===1?" r\u00e9sultat":" r\u00e9sultats");
}
function cs(){var i=document.getElementById("sq");i.value="";document.getElementById("cb").classList.remove("on");document.getElementById("mc").textContent="";document.querySelectorAll("tbody tr").forEach(function(r){r.classList.remove("hd");rm(r);});}
function hl(r,q){r.querySelectorAll("td").forEach(function(td){var o=td.getAttribute("data-o")||td.textContent;td.setAttribute("data-o",o);var re=new RegExp("("+q.replace(/[.*+?^${}()|[\]\\]/g,"\\$&")+")","gi");td.innerHTML=o.replace(re,"<mark>$1<\/mark>");});}
function rm(r){r.querySelectorAll("td").forEach(function(td){var o=td.getAttribute("data-o");if(o){td.textContent=o;td.removeAttribute("data-o");}});}
function initSort(){
  document.querySelectorAll(".sh table").forEach(function(tbl){
    tbl.querySelectorAll("thead th").forEach(function(th,ci){
      if(/joker|attendus/i.test(th.textContent)) return;
      th.classList.add("sk");
      var sp=document.createElement("span");
      sp.className="sa";sp.textContent="\u21c5";
      th.appendChild(sp);
      th.addEventListener("click",function(){
        var asc=th.dataset.sort!=="asc";
        tbl.querySelectorAll("thead th").forEach(function(h){
          h.dataset.sort="";
          var s=h.querySelector(".sa");
          if(s){s.textContent="\u21c5";s.style.opacity=".55";}
        });
        th.dataset.sort=asc?"asc":"desc";
        sp.textContent=asc?"\u2191":"\u2193";
        sp.style.opacity="1";
        var tbody=tbl.querySelector("tbody");
        var rows=Array.from(tbody.querySelectorAll("tr"));
        rows.sort(function(a,b){
          var av=(a.cells[ci]||{}).textContent||"";
          var bv=(b.cells[ci]||{}).textContent||"";
          av=av.trim();bv=bv.trim();
          var an=parseFloat(av.replace(/[^\d.-]/g,"")),bn=parseFloat(bv.replace(/[^\d.-]/g,""));
          if(!isNaN(an)&&!isNaN(bn)) return asc?an-bn:bn-an;
          return asc?av.localeCompare(bv,"fr"):bv.localeCompare(av,"fr");
        });
        rows.forEach(function(r){tbody.appendChild(r);});
      });
    });
  });
}
</script>
</body></html>
