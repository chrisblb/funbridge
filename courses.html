<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>Mes Courses</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --green:#1a9e5c;--green-dark:#157a47;--green-light:#e8f7ef;
  --red:#e53e3e;--gray:#6b7280;--light:#f3f4f6;--white:#fff;
  --text:#111827;--subtext:#6b7280;--border:#e5e7eb;
  --shadow:0 2px 12px rgba(0,0,0,.10);
}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--light);color:var(--text);-webkit-tap-highlight-color:transparent}

/* ─── PAGES ─── */
.page{display:none;flex-direction:column;height:100vh;overflow:hidden}
.page.active{display:flex}

/* ─── TOPBAR ─── */
.topbar{background:var(--white);padding:16px 16px 12px;border-bottom:1px solid var(--border);flex-shrink:0}
.topbar h1{font-size:1.25rem;font-weight:700}
.topbar .sub{font-size:.8rem;color:var(--subtext);margin-top:2px}
.back-btn{display:flex;align-items:center;gap:6px;background:none;border:none;font-size:1rem;color:var(--green);font-weight:600;padding:0;cursor:pointer;margin-bottom:8px}

/* ─── SCROLL AREA ─── */
.scroll{flex:1;overflow-y:auto;padding:16px;-webkit-overflow-scrolling:touch}

/* ─── EMPTY STATE ─── */
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;text-align:center;gap:16px}
.empty .icon{font-size:3.5rem}
.empty h2{font-size:1.2rem;font-weight:600;color:var(--text)}
.empty p{font-size:.9rem;color:var(--subtext)}

/* ─── BUTTONS ─── */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:14px 24px;border-radius:50px;border:none;font-size:1rem;font-weight:600;cursor:pointer;transition:background .15s,transform .1s}
.btn:active{transform:scale(.97)}
.btn-green{background:var(--green);color:#fff}
.btn-green:active{background:var(--green-dark)}
.btn-outline{background:var(--white);color:var(--green);border:2px solid var(--green)}
.btn-full{width:100%}
.btn-sm{padding:8px 16px;font-size:.85rem}
.btn-red{background:var(--red);color:#fff}
.btn-icon{background:none;border:none;font-size:1.3rem;cursor:pointer;padding:8px;border-radius:50%;transition:background .15s}
.btn-icon:active{background:var(--light)}

/* ─── LIST CARDS ─── */
.card{background:var(--white);border-radius:14px;padding:16px;margin-bottom:12px;box-shadow:var(--shadow);cursor:pointer;transition:transform .1s,box-shadow .1s;display:flex;align-items:center;gap:14px}
.card:active{transform:scale(.98);box-shadow:none}
.card-icon{width:48px;height:48px;border-radius:12px;background:var(--green-light);display:flex;align-items:center;justify-content:center;font-size:1.4rem;flex-shrink:0}
.card-body{flex:1;min-width:0}
.card-title{font-weight:700;font-size:1rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-sub{font-size:.8rem;color:var(--subtext);margin-top:2px}
.card-actions{display:flex;gap:4px;flex-shrink:0}
.badge{display:inline-flex;align-items:center;justify-content:center;background:var(--green);color:#fff;border-radius:50px;font-size:.7rem;font-weight:700;padding:2px 8px;min-width:24px}
.badge-gray{background:var(--border);color:var(--subtext)}

/* ─── ITEMS ─── */
.item{display:flex;align-items:center;gap:12px;padding:14px 0;border-bottom:1px solid var(--border)}
.item:last-child{border-bottom:none}
.item-check{width:26px;height:26px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:all .15s;background:var(--white)}
.item-check.done{background:var(--green);border-color:var(--green);color:#fff}
.item-body{flex:1;min-width:0}
.item-name{font-size:.95rem;font-weight:500}
.item-name.done{text-decoration:line-through;color:var(--subtext)}
.item-qty{font-size:.8rem;color:var(--subtext);margin-top:1px}
.item-del{color:var(--subtext);opacity:.5}

/* ─── INPUT AREA ─── */
.input-row{display:flex;gap:8px;padding:12px 16px;background:var(--white);border-top:1px solid var(--border);flex-shrink:0}
.input-row input{flex:1;padding:12px 14px;border:1.5px solid var(--border);border-radius:50px;font-size:.95rem;outline:none;background:var(--light)}
.input-row input:focus{border-color:var(--green);background:var(--white)}
.qty-row{display:flex;gap:8px;padding:0 16px 12px;background:var(--white)}
.qty-row input{width:80px;padding:10px 14px;border:1.5px solid var(--border);border-radius:50px;font-size:.9rem;outline:none;background:var(--light)}
.qty-row input:focus{border-color:var(--green);background:var(--white)}

/* ─── MODAL ─── */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:100;align-items:flex-end}
.overlay.open{display:flex}
.modal{background:var(--white);border-radius:20px 20px 0 0;padding:24px 20px;width:100%;max-width:480px;margin:0 auto}
.modal h2{font-size:1.1rem;font-weight:700;margin-bottom:16px}
.modal input{width:100%;padding:13px 16px;border:1.5px solid var(--border);border-radius:12px;font-size:1rem;outline:none;margin-bottom:12px;background:var(--light)}
.modal input:focus{border-color:var(--green);background:var(--white)}
.modal-btns{display:flex;gap:10px}
.modal-btns .btn{flex:1}

/* ─── PROGRESS ─── */
.progress-bar{height:4px;background:var(--border);border-radius:2px;margin:8px 0 4px;overflow:hidden}
.progress-fill{height:100%;background:var(--green);border-radius:2px;transition:width .3s}

/* ─── FILTER TABS ─── */
.tabs{display:flex;gap:8px;padding:0 16px 12px;background:var(--white);border-bottom:1px solid var(--border);flex-shrink:0;overflow-x:auto;-webkit-overflow-scrolling:touch}
.tab{padding:7px 16px;border-radius:50px;border:none;font-size:.85rem;font-weight:600;cursor:pointer;white-space:nowrap;background:var(--light);color:var(--subtext)}
.tab.active{background:var(--green);color:#fff}

/* ─── FAB ─── */
.fab{position:fixed;bottom:24px;right:20px;width:56px;height:56px;border-radius:50%;background:var(--green);color:#fff;border:none;font-size:1.6rem;cursor:pointer;box-shadow:0 4px 16px rgba(26,158,92,.4);display:flex;align-items:center;justify-content:center;z-index:50}
.fab:active{background:var(--green-dark);transform:scale(.95)}
</style>
</head>
<body>

<!-- ════ PAGE 1 : LISTES ════ -->
<div class="page active" id="page-lists">
  <div class="topbar">
    <h1>🛒 Mes Courses</h1>
    <div class="sub" id="lists-sub">Chargement…</div>
  </div>
  <div class="scroll" id="lists-container">
    <div class="empty" id="empty-lists">
      <div class="icon">🛒</div>
      <h2>Aucune liste</h2>
      <p>Crée ta première liste pour commencer.</p>
      <button class="btn btn-green" onclick="openNewListModal()">+ Nouvelle liste</button>
    </div>
  </div>
  <button class="fab" id="fab-lists" style="display:none" onclick="openNewListModal()">＋</button>
</div>

<!-- ════ PAGE 2 : ITEMS ════ -->
<div class="page" id="page-items">
  <div class="topbar">
    <button class="back-btn" onclick="goHome()">‹ Toutes les listes</button>
    <h1 id="items-title">Liste</h1>
    <div class="sub" id="items-sub"></div>
  </div>
  <div class="tabs">
    <button class="tab active" id="tab-all" onclick="filterItems('all')">Tout</button>
    <button class="tab" id="tab-todo" onclick="filterItems('todo')">À prendre</button>
    <button class="tab" id="tab-done" onclick="filterItems('done')">Dans le panier</button>
  </div>
  <div class="scroll" id="items-container">
    <div class="empty" id="empty-items" style="display:none">
      <div class="icon">📝</div>
      <h2>Liste vide</h2>
      <p>Ajoute des articles ci-dessous.</p>
    </div>
    <div id="items-list"></div>
  </div>
  <div class="input-row">
    <input type="text" id="item-input" placeholder="Article…" autocomplete="off" autocorrect="off" spellcheck="false" onkeydown="if(event.key==='Enter')addItem()">
    <input type="text" id="qty-input" placeholder="Qté" style="width:60px;padding:12px 10px" autocomplete="off" onkeydown="if(event.key==='Enter')addItem()">
    <button class="btn btn-green btn-sm" onclick="addItem()">＋</button>
  </div>
</div>

<!-- ════ MODAL NOUVELLE LISTE ════ -->
<div class="overlay" id="modal-overlay" onclick="closeModal(event)">
  <div class="modal">
    <h2>Nouvelle liste</h2>
    <input type="text" id="list-name-input" placeholder="Ex : Carrefour, Marché…" maxlength="40" onkeydown="if(event.key==='Enter')createList()">
    <div class="modal-btns">
      <button class="btn btn-outline" onclick="closeModalDirect()">Annuler</button>
      <button class="btn btn-green" onclick="createList()">Créer</button>
    </div>
  </div>
</div>

<script>
const KEY = 'mc_lists_v2';
let data = [];
let currentListId = null;
let itemFilter = 'all';

function load() {
  try { data = JSON.parse(localStorage.getItem(KEY)) || []; }
  catch(e) { data = []; }
}
function save() {
  localStorage.setItem(KEY, JSON.stringify(data));
}
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }

function renderLists() {
  load();
  const container = document.getElementById('lists-container');
  const empty = document.getElementById('empty-lists');
  const fab = document.getElementById('fab-lists');
  const sub = document.getElementById('lists-sub');

  if (data.length === 0) {
    container.innerHTML = '';
    container.appendChild(empty);
    empty.style.display = 'flex';
    fab.style.display = 'none';
    sub.textContent = 'Aucune liste';
    return;
  }

  empty.style.display = 'none';
  fab.style.display = 'flex';
  const total = data.reduce((s,l) => s + (l.items||[]).length, 0);
  const done = data.reduce((s,l) => s + (l.items||[]).filter(i=>i.done).length, 0);
  sub.textContent = `${data.length} liste${data.length>1?'s':''} · ${done}/${total} article${total>1?'s':''}`;

  container.innerHTML = '';
  data.forEach(list => {
    const items = list.items || [];
    const doneCount = items.filter(i=>i.done).length;
    const pct = items.length ? Math.round(doneCount/items.length*100) : 0;
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <div class="card-icon">🛒</div>
      <div class="card-body" onclick="openList('${list.id}')">
        <div class="card-title">${esc(list.name)}</div>
        <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
        <div class="card-sub">${doneCount}/${items.length} article${items.length>1?'s':''} · ${pct}%</div>
      </div>
      <div class="card-actions">
        <button class="btn-icon" onclick="event.stopPropagation();deleteList('${list.id}')" title="Supprimer">🗑</button>
      </div>`;
    container.appendChild(card);
  });
}

function deleteList(id) {
  if (!confirm('Supprimer cette liste ?')) return;
  data = data.filter(l => l.id !== id);
  save();
  renderLists();
}

function openNewListModal() {
  document.getElementById('modal-overlay').classList.add('open');
  setTimeout(() => document.getElementById('list-name-input').focus(), 100);
}
function closeModalDirect() {
  document.getElementById('modal-overlay').classList.remove('open');
  document.getElementById('list-name-input').value = '';
}
function closeModal(e) {
  if (e.target === document.getElementById('modal-overlay')) closeModalDirect();
}
function createList() {
  const name = document.getElementById('list-name-input').value.trim();
  if (!name) { document.getElementById('list-name-input').focus(); return; }
  const list = { id: uid(), name, items: [], created: Date.now() };
  data.push(list);
  save();
  closeModalDirect();
  openList(list.id);
}

function openList(id) {
  load();
  currentListId = id;
  itemFilter = 'all';
  showPage('page-items');
  renderItems();
  setTimeout(() => document.getElementById('item-input').focus(), 200);
}

function goHome() {
  currentListId = null;
  showPage('page-lists');
  renderLists();
}

function getList() {
  return data.find(l => l.id === currentListId);
}

function renderItems() {
  const list = getList();
  if (!list) { goHome(); return; }

  document.getElementById('items-title').textContent = list.name;

  const items = list.items || [];
  const doneCount = items.filter(i=>i.done).length;
  const pct = items.length ? Math.round(doneCount/items.length*100) : 0;
  document.getElementById('items-sub').textContent =
    items.length ? `${doneCount}/${items.length} · ${pct}% dans le panier` : 'Liste vide';

  ['all','todo','done'].forEach(f => {
    document.getElementById('tab-'+f).classList.toggle('active', itemFilter===f);
  });

  const filtered = items.filter(i => {
    if (itemFilter==='todo') return !i.done;
    if (itemFilter==='done') return i.done;
    return true;
  });

  const container = document.getElementById('items-list');
  const empty = document.getElementById('empty-items');

  if (filtered.length === 0) {
    container.innerHTML = '';
    empty.style.display = 'flex';
    return;
  }
  empty.style.display = 'none';
  container.innerHTML = '';

  const sorted = [...filtered].sort((a,b) => {
    if (a.done === b.done) return a.order - b.order;
    return a.done ? 1 : -1;
  });

  sorted.forEach(item => {
    const row = document.createElement('div');
    row.className = 'item';
    row.innerHTML = `
      <div class="item-check${item.done?' done':''}" onclick="toggleItem('${item.id}')">
        ${item.done ? '✓' : ''}
      </div>
      <div class="item-body">
        <div class="item-name${item.done?' done':''}">${esc(item.name)}</div>
        ${item.qty ? `<div class="item-qty">${esc(item.qty)}</div>` : ''}
      </div>
      <button class="btn-icon item-del" onclick="deleteItem('${item.id}')">✕</button>`;
    container.appendChild(row);
  });
}

function addItem() {
  const nameEl = document.getElementById('item-input');
  const qtyEl = document.getElementById('qty-input');
  const name = nameEl.value.trim();
  if (!name) { nameEl.focus(); return; }
  const qty = qtyEl.value.trim();

  load();
  const list = getList();
  if (!list) return;
  list.items = list.items || [];
  list.items.push({ id: uid(), name, qty, done: false, order: Date.now() });
  save();

  nameEl.value = '';
  qtyEl.value = '';
  nameEl.focus();
  renderItems();
}

function toggleItem(itemId) {
  load();
  const list = getList();
  if (!list) return;
  const item = (list.items||[]).find(i => i.id === itemId);
  if (item) item.done = !item.done;
  save();
  renderItems();
}

function deleteItem(itemId) {
  load();
  const list = getList();
  if (!list) return;
  list.items = (list.items||[]).filter(i => i.id !== itemId);
  save();
  renderItems();
}

function filterItems(f) {
  itemFilter = f;
  renderItems();
}

function showPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0,0);
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

load();
renderLists();
</script>
</body>
</html>
